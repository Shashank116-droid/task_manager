name: task_manager
description: "A production-ready Task Manager App with Firebase integration."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.6

  # State Management
  provider: ^6.1.5

  # Networking
  http: ^1.3.0

  # UI Utilities
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
